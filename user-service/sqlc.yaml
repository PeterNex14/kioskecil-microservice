version: "2"
sql: 
 - schema: "db/migrations"
   queries: "db/queries"
   engine: "postgresql"
   gen:
    go:
     package: "db_users_gen"
     out: "db/sqlc"
     emit_json_tags: true
     emit_prepared_queries: true
     emit_interface: true

     overrides:
       - db_type: "uuid"
         go_type: "github.com/google/uuid.UUID"


